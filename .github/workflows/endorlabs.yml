# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Endor Labs
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '30 15 * * 0'
jobs:
  scan:
    permissions:
      security-events: write # Used to upload sarif artifact to GitHub
      contents: read # Used to checkout a private repository by actions/checkout.
      actions: read # Required for private repositories to upload sarif files. GitHub Advanced Security licenses are required.
      id-token: write # Used for keyless authentication to Endor Labs
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
    #### Package Build Instructions
    ### Use this section to define the build steps used by your software package.
    ### Endor Labs builds your software for you where possible but the required build tools must be made available.
    # python
    - name: Setup python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Build
      run: pip install -r requirements.txt
      # Alternative: pip install .
      # If using Poetry: poetry install
    - name: Endor Labs scan pull request
      if: github.event_name == 'pull_request'
      uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
      with:
        namespace: "endor-solutions-ypulse.github-app" # Modify the namespace to your Endor Labs tenant namespace.
        sarif_file: findings.sarif
    - name: Endor Labs scan monitor
      if: github.event_name == 'push'
      uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
      with:
        namespace: "endor-solutions-ypulse.github-app" # Modify the namespace to your Endor Labs tenant namespace.
        ci_run: "false"
        sarif_file: findings.sarif
    - name: Upload SARIF to github
      uses: github/codeql-action/upload-sarif@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
      with:
        sarif_file: findings.sarif
